<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#130828"/>
      <stop offset="100%" stop-color="#09090b"/>
    </radialGradient>

    <clipPath id="iconClip">
      <rect width="1024" height="1024" rx="232"/>
    </clipPath>

    <filter id="ambGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="70"/>
    </filter>

    <filter id="nodeGlow" x="-300%" y="-300%" width="700%" height="700%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="24" result="halo"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="body"/>
      <feMerge>
        <feMergeNode in="halo"/>
        <feMergeNode in="halo"/>
        <feMergeNode in="body"/>
      </feMerge>
    </filter>

    <filter id="traceGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20" result="halo"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="body"/>
      <feMerge>
        <feMergeNode in="halo"/>
        <feMergeNode in="halo"/>
        <feMergeNode in="body"/>
      </feMerge>
    </filter>

    <!-- Clip to keep calendar header rounded only at top -->
    <clipPath id="calClip">
      <rect x="130" y="270" width="340" height="420" rx="30"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="232" fill="url(#bg)"/>

  <g clip-path="url(#iconClip)">

    <!-- Ambient centre glow -->
    <circle cx="512" cy="512" r="350" fill="#6d28d9" opacity="0.15" filter="url(#ambGlow)"/>

    <!-- ===== CALENDAR (left shape) ===== -->

    <!-- Calendar body -->
    <rect x="130" y="270" width="340" height="420" rx="30"
          fill="#0d0a1e" stroke="white" stroke-width="16"/>

    <!-- Calendar header band (top 70px), clipped to stay inside calendar rounded rect -->
    <rect x="130" y="270" width="340" height="70"
          fill="#0891b2" opacity="0.8"
          clip-path="url(#calClip)"/>

    <!-- Binding ring holes straddling top edge of header -->
    <circle cx="215" cy="268" r="16" fill="white" opacity="0.8"/>
    <circle cx="385" cy="268" r="16" fill="white" opacity="0.8"/>

    <!-- Horizontal grid lines inside calendar body -->
    <line x1="148" y1="395" x2="462" y2="395" stroke="white" stroke-opacity="0.15" stroke-width="1.5"/>
    <line x1="148" y1="455" x2="462" y2="455" stroke="white" stroke-opacity="0.15" stroke-width="1.5"/>
    <line x1="148" y1="515" x2="462" y2="515" stroke="white" stroke-opacity="0.15" stroke-width="1.5"/>
    <line x1="148" y1="575" x2="462" y2="575" stroke="white" stroke-opacity="0.15" stroke-width="1.5"/>

    <!-- Date dots in calendar cells -->
    <circle cx="185" cy="425" r="7" fill="white" opacity="0.5"/>
    <circle cx="250" cy="425" r="7" fill="white" opacity="0.5"/>
    <circle cx="315" cy="425" r="7" fill="white" opacity="0.5"/>
    <circle cx="380" cy="425" r="7" fill="white" opacity="0.5"/>
    <circle cx="185" cy="485" r="7" fill="white" opacity="0.5"/>
    <circle cx="250" cy="485" r="7" fill="white" opacity="0.5"/>
    <circle cx="315" cy="485" r="7" fill="white" opacity="0.5"/>
    <circle cx="380" cy="485" r="7" fill="white" opacity="0.5"/>
    <circle cx="185" cy="545" r="7" fill="white" opacity="0.5"/>
    <circle cx="250" cy="545" r="7" fill="white" opacity="0.5"/>
    <circle cx="315" cy="545" r="7" fill="white" opacity="0.5"/>

    <!-- ===== OVERLAP GLOW (intersection zone x=310–470, y=270–590) ===== -->
    <!-- Soft purple glow at the intersection of calendar and bubble -->
    <ellipse cx="390" cy="430" rx="100" ry="160"
             fill="#818cf8" opacity="0.25"/>

    <!-- ===== SPEECH BUBBLE (right shape, overlapping) ===== -->

    <!-- Bubble body -->
    <rect x="310" y="270" width="490" height="320" rx="80"
          fill="#170f30" stroke="white" stroke-width="16"/>

    <!-- Bubble tail: pointing down-left -->
    <polygon points="490,590 460,680 560,590"
             fill="white" opacity="0.85"/>

    <!-- Text-line pills inside bubble (incoming message representation) -->
    <rect x="360" y="343" width="370" height="24" rx="12" fill="white" opacity="0.2"/>
    <rect x="360" y="383" width="300" height="24" rx="12" fill="white" opacity="0.2"/>
    <rect x="360" y="423" width="200" height="24" rx="12" fill="white" opacity="0.2"/>

    <!-- Suggested reply badge near overlap zone -->
    <rect x="380" y="484" width="180" height="32" rx="16"
          fill="#67e8f9" opacity="0.9"
          filter="url(#traceGlow)"/>

    <!-- Sparkle dot on badge -->
    <circle cx="400" cy="500" r="8" fill="white"/>

  </g>
</svg>
