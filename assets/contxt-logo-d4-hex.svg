<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#130828"/>
      <stop offset="100%" stop-color="#09090b"/>
    </radialGradient>

    <!--
      Regular hexagon r=295 from (512,512):
        Top (512,217)  TR (768,365)  BR (768,660)
        Bot (512,807)  BL (256,660)  TL (256,365)
    -->
    <linearGradient id="lnTop" x1="512" y1="217" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#67e8f9" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="lnTR" x1="768" y1="365" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#fcd34d" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="lnBR" x1="768" y1="660" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f43f5e" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#fb7185" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="lnBot" x1="512" y1="807" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#93c5fd" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="lnBL" x1="256" y1="660" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6ee7b7" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="lnTL" x1="256" y1="365" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0.85"/>
    </linearGradient>

    <filter id="ambGlow"    x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="70"/></filter>
    <filter id="lineGlow"   x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bubbleGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="28" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dotGlow"    x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="232" fill="url(#bg)"/>

  <!-- Ambient centre glow -->
  <circle cx="512" cy="490" r="320" fill="#6d28d9" opacity="0.18" filter="url(#ambGlow)"/>

  <!--
    Bubble: nearly full canvas — 50px margin sides/top, tail hangs to y=935.
    x: 50–974  (width 924)   y: 50–850  (height 800)   corner radius 170.
    Bubble drawn FIRST so lines appear on top as glowing rays inside the dark space.
  -->
  <!-- Bubble glow -->
  <path d="M 50 220 Q 50 50 220 50 L 804 50 Q 974 50 974 220
           L 974 680 Q 974 850 804 850 L 605 850 L 575 935 L 545 850
           L 220 850 Q 50 850 50 680 Z"
        fill="#7c3aed" opacity="0.18" filter="url(#bubbleGlow)"/>
  <!-- Bubble dark fill -->
  <path d="M 50 220 Q 50 50 220 50 L 804 50 Q 974 50 974 220
           L 974 680 Q 974 850 804 850 L 605 850 L 575 935 L 545 850
           L 220 850 Q 50 850 50 680 Z"
        fill="#0d0a1e"/>

  <!-- Lines drawn on top of bubble fill — visible as coloured rays inside -->
  <!-- Glow pass -->
  <line x1="512" y1="217" x2="512" y2="512" stroke="url(#lnTop)" stroke-width="18" stroke-linecap="round" opacity="0.5" filter="url(#lineGlow)"/>
  <line x1="768" y1="365" x2="512" y2="512" stroke="url(#lnTR)"  stroke-width="18" stroke-linecap="round" opacity="0.5" filter="url(#lineGlow)"/>
  <line x1="768" y1="660" x2="512" y2="512" stroke="url(#lnBR)"  stroke-width="18" stroke-linecap="round" opacity="0.5" filter="url(#lineGlow)"/>
  <line x1="512" y1="807" x2="512" y2="512" stroke="url(#lnBot)" stroke-width="18" stroke-linecap="round" opacity="0.5" filter="url(#lineGlow)"/>
  <line x1="256" y1="660" x2="512" y2="512" stroke="url(#lnBL)"  stroke-width="18" stroke-linecap="round" opacity="0.5" filter="url(#lineGlow)"/>
  <line x1="256" y1="365" x2="512" y2="512" stroke="url(#lnTL)"  stroke-width="18" stroke-linecap="round" opacity="0.5" filter="url(#lineGlow)"/>
  <!-- Crisp pass -->
  <line x1="512" y1="217" x2="512" y2="512" stroke="url(#lnTop)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="768" y1="365" x2="512" y2="512" stroke="url(#lnTR)"  stroke-width="3.5" stroke-linecap="round"/>
  <line x1="768" y1="660" x2="512" y2="512" stroke="url(#lnBR)"  stroke-width="3.5" stroke-linecap="round"/>
  <line x1="512" y1="807" x2="512" y2="512" stroke="url(#lnBot)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="256" y1="660" x2="512" y2="512" stroke="url(#lnBL)"  stroke-width="3.5" stroke-linecap="round"/>
  <line x1="256" y1="365" x2="512" y2="512" stroke="url(#lnTL)"  stroke-width="3.5" stroke-linecap="round"/>

  <!-- Bubble border + shimmer on top of lines -->
  <path d="M 50 220 Q 50 50 220 50 L 804 50 Q 974 50 974 220
           L 974 680 Q 974 850 804 850 L 605 850 L 575 935 L 545 850
           L 220 850 Q 50 850 50 680 Z"
        fill="none" stroke="white" stroke-width="3" stroke-opacity="0.4"/>
  <!-- Glass shimmer band across top -->
  <path d="M 50 220 Q 50 50 220 50 L 804 50 Q 974 50 974 220 L 974 240 L 50 240 Z"
        fill="white" opacity="0.07"/>

  <!-- Three typing dots — centred at y=450, x=327/512/697, r=48 -->
  <circle cx="327" cy="450" r="48" fill="white" filter="url(#dotGlow)"/>
  <circle cx="512" cy="450" r="48" fill="white" filter="url(#dotGlow)"/>
  <circle cx="697" cy="450" r="48" fill="white" filter="url(#dotGlow)"/>

  <!--
    Data particles — on lines inside the bubble, between the dots and the bubble edges.
    t measured from hex-point toward centre (512,512).
    Top  t=0.40 → (512, 335)   above dots             ✓
    TR   t=0.40 → (666, 424)   upper-right, near wall ✓
    BR   t=0.40 → (666, 601)   lower-right             ✓
    Bot  t=0.40 → (512, 689)   below dots, above tail  ✓
    BL   t=0.40 → (358, 601)   lower-left              ✓
    TL   t=0.40 → (358, 424)   upper-left              ✓
  -->
  <circle cx="512" cy="335" r="15" fill="#22d3ee" opacity="0.95" filter="url(#dotGlow)"/>
  <circle cx="666" cy="424" r="15" fill="#fbbf24" opacity="0.95" filter="url(#dotGlow)"/>
  <circle cx="666" cy="601" r="15" fill="#fb7185" opacity="0.95" filter="url(#dotGlow)"/>
  <circle cx="512" cy="689" r="15" fill="#93c5fd" opacity="0.95" filter="url(#dotGlow)"/>
  <circle cx="358" cy="601" r="15" fill="#34d399" opacity="0.95" filter="url(#dotGlow)"/>
  <circle cx="358" cy="424" r="15" fill="#c4b5fd" opacity="0.95" filter="url(#dotGlow)"/>
</svg>
