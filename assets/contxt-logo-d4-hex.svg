<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#130828"/>
      <stop offset="100%" stop-color="#09090b"/>
    </radialGradient>

    <!--
      Lines extended to canvas edges — hex directions hit the viewBox boundary at:
        Top          (512,    0)
        Top-right    (1024, 216)
        Bottom-right (1024, 808)
        Bottom       (512, 1024)
        Bottom-left  (   0, 808)
        Top-left     (   0, 216)
    -->
    <linearGradient id="lnTop" x1="512" y1="0"    x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.15"/><stop offset="100%" stop-color="#e0f2fe" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="lnTR"  x1="1024" y1="216" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.15"/><stop offset="100%" stop-color="#fef3c7" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="lnBR"  x1="1024" y1="808" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f43f5e" stop-opacity="0.15"/><stop offset="100%" stop-color="#ffe4e6" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="lnBot" x1="512" y1="1024" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15"/><stop offset="100%" stop-color="#dbeafe" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="lnBL"  x1="0"    y1="808" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.15"/><stop offset="100%" stop-color="#d1fae5" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="lnTL"  x1="0"    y1="216" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.15"/><stop offset="100%" stop-color="#ede9fe" stop-opacity="0.9"/>
    </linearGradient>

    <filter id="ambGlow"  x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="60"/></filter>
    <filter id="lineGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dotGlow"  x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="232" fill="url(#bg)"/>

  <!-- Ambient centre glow -->
  <circle cx="512" cy="505" r="340" fill="#6d28d9" opacity="0.16" filter="url(#ambGlow)"/>

  <!-- Lines: glow pass -->
  <line x1="512" y1="0"    x2="512" y2="512" stroke="url(#lnTop)" stroke-width="22" stroke-linecap="round" opacity="0.4" filter="url(#lineGlow)"/>
  <line x1="1024" y1="216" x2="512" y2="512" stroke="url(#lnTR)"  stroke-width="22" stroke-linecap="round" opacity="0.4" filter="url(#lineGlow)"/>
  <line x1="1024" y1="808" x2="512" y2="512" stroke="url(#lnBR)"  stroke-width="22" stroke-linecap="round" opacity="0.4" filter="url(#lineGlow)"/>
  <line x1="512" y1="1024" x2="512" y2="512" stroke="url(#lnBot)" stroke-width="22" stroke-linecap="round" opacity="0.4" filter="url(#lineGlow)"/>
  <line x1="0"    y1="808" x2="512" y2="512" stroke="url(#lnBL)"  stroke-width="22" stroke-linecap="round" opacity="0.4" filter="url(#lineGlow)"/>
  <line x1="0"    y1="216" x2="512" y2="512" stroke="url(#lnTL)"  stroke-width="22" stroke-linecap="round" opacity="0.4" filter="url(#lineGlow)"/>
  <!-- Lines: crisp pass -->
  <line x1="512" y1="0"    x2="512" y2="512" stroke="url(#lnTop)" stroke-width="4" stroke-linecap="round"/>
  <line x1="1024" y1="216" x2="512" y2="512" stroke="url(#lnTR)"  stroke-width="4" stroke-linecap="round"/>
  <line x1="1024" y1="808" x2="512" y2="512" stroke="url(#lnBR)"  stroke-width="4" stroke-linecap="round"/>
  <line x1="512" y1="1024" x2="512" y2="512" stroke="url(#lnBot)" stroke-width="4" stroke-linecap="round"/>
  <line x1="0"    y1="808" x2="512" y2="512" stroke="url(#lnBL)"  stroke-width="4" stroke-linecap="round"/>
  <line x1="0"    y1="216" x2="512" y2="512" stroke="url(#lnTL)"  stroke-width="4" stroke-linecap="round"/>

  <!--
    Central typing bubble — 1.4× previous 320×240:
    x: 288–736 (448px wide)   y: 337–673 (336px tall)   corner radius 59
    Tail centre x=585 (right of x=512 to clear bottom line), tip y=726
  -->
  <!-- Bubble dark fill -->
  <path d="M 288 396 Q 288 337 347 337 L 677 337 Q 736 337 736 396
           L 736 614 Q 736 673 677 673 L 606 673 L 585 726 L 564 673
           L 347 673 Q 288 673 288 614 Z"
        fill="#0d0a1e"/>
  <!-- White border -->
  <path d="M 288 396 Q 288 337 347 337 L 677 337 Q 736 337 736 396
           L 736 614 Q 736 673 677 673 L 606 673 L 585 726 L 564 673
           L 347 673 Q 288 673 288 614 Z"
        fill="none" stroke="white" stroke-width="3" stroke-opacity="0.45"/>
  <!-- Top-edge glass shimmer -->
  <path d="M 288 396 Q 288 337 347 337 L 677 337 Q 736 337 736 396
           L 736 410 Q 288 410 288 396 Z"
        fill="white" opacity="0.10"/>
  <!-- Three typing dots — y midpoint (337+673)/2=505, r=28, spacing 82px -->
  <circle cx="430" cy="505" r="28" fill="white" filter="url(#dotGlow)"/>
  <circle cx="512" cy="505" r="28" fill="white" filter="url(#dotGlow)"/>
  <circle cx="594" cy="505" r="28" fill="white" filter="url(#dotGlow)"/>

  <!--
    Data particles — t=0.4 from canvas edge toward centre on each line.
    Top  (512,  0)→(512,512):   (512, 205)  above bubble top 337        ✓
    TR   (1024,216)→(512,512):  (819, 334)  right of bubble edge 736    ✓
    BR   (1024,808)→(512,512):  (819, 689)  right of bubble edge 736    ✓
    Bot  (512,1024)→(512,512):  (512, 819)  below tail tip 726          ✓
    BL   (0,  808)→(512,512):   (205, 689)  left of bubble edge 288     ✓
    TL   (0,  216)→(512,512):   (205, 334)  left of bubble edge 288     ✓
  -->
  <circle cx="512" cy="205" r="15" fill="#22d3ee" opacity="0.95" filter="url(#dotGlow)"/>
  <circle cx="819" cy="334" r="15" fill="#fbbf24" opacity="0.95" filter="url(#dotGlow)"/>
  <circle cx="819" cy="689" r="15" fill="#fb7185" opacity="0.95" filter="url(#dotGlow)"/>
  <circle cx="512" cy="819" r="15" fill="#93c5fd" opacity="0.95" filter="url(#dotGlow)"/>
  <circle cx="205" cy="689" r="15" fill="#34d399" opacity="0.95" filter="url(#dotGlow)"/>
  <circle cx="205" cy="334" r="15" fill="#c4b5fd" opacity="0.95" filter="url(#dotGlow)"/>
</svg>
