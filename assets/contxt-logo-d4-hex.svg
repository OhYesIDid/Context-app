<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#130828"/>
      <stop offset="100%" stop-color="#09090b"/>
    </radialGradient>

    <!-- Per-node fills -->
    <radialGradient id="nLoc"  cx="35%" cy="30%" r="70%"><stop offset="0%" stop-color="#67e8f9"/><stop offset="100%" stop-color="#0e7490"/></radialGradient>
    <radialGradient id="nCal"  cx="35%" cy="30%" r="70%"><stop offset="0%" stop-color="#fcd34d"/><stop offset="100%" stop-color="#b45309"/></radialGradient>
    <radialGradient id="nMsg"  cx="35%" cy="30%" r="70%"><stop offset="0%" stop-color="#fb7185"/><stop offset="100%" stop-color="#be123c"/></radialGradient>
    <radialGradient id="nWthr" cx="35%" cy="30%" r="70%"><stop offset="0%" stop-color="#93c5fd"/><stop offset="100%" stop-color="#1d4ed8"/></radialGradient>
    <radialGradient id="nBat"  cx="35%" cy="30%" r="70%"><stop offset="0%" stop-color="#6ee7b7"/><stop offset="100%" stop-color="#047857"/></radialGradient>
    <radialGradient id="nHist" cx="35%" cy="30%" r="70%"><stop offset="0%" stop-color="#c4b5fd"/><stop offset="100%" stop-color="#6d28d9"/></radialGradient>

    <!-- Iris orb -->
    <radialGradient id="orbGlow" cx="50%" cy="42%" r="50%">
      <stop offset="0%"   stop-color="white"/>
      <stop offset="55%"  stop-color="white" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <!--
      Regular hexagon r=295 from (512,512):
        Top          (512, 217)
        Top-right    (768, 365)
        Bottom-right (768, 660)
        Bottom       (512, 807)
        Bottom-left  (256, 660)
        Top-left     (256, 365)
    -->
    <linearGradient id="lnTop" x1="512" y1="217" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.3"/><stop offset="100%" stop-color="#e0f2fe" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="lnTR" x1="768" y1="365" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.3"/><stop offset="100%" stop-color="#fef3c7" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="lnBR" x1="768" y1="660" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f43f5e" stop-opacity="0.3"/><stop offset="100%" stop-color="#ffe4e6" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="lnBot" x1="512" y1="807" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3"/><stop offset="100%" stop-color="#dbeafe" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="lnBL" x1="256" y1="660" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.3"/><stop offset="100%" stop-color="#d1fae5" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="lnTL" x1="256" y1="365" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.3"/><stop offset="100%" stop-color="#ede9fe" stop-opacity="0.9"/>
    </linearGradient>

    <filter id="ambGlow"    x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="55"/></filter>
    <filter id="nodeGlow"   x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="22" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="lineGlow"   x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="orbHalo"    x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="28" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dotGlow"    x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="232" fill="url(#bg)"/>

  <!-- Ambient colour clouds -->
  <circle cx="512" cy="430" r="260" fill="#06b6d4" opacity="0.04" filter="url(#ambGlow)"/>
  <circle cx="600" cy="540" r="240" fill="#f59e0b" opacity="0.04" filter="url(#ambGlow)"/>
  <circle cx="580" cy="620" r="240" fill="#f43f5e" opacity="0.04" filter="url(#ambGlow)"/>
  <circle cx="512" cy="580" r="260" fill="#3b82f6" opacity="0.04" filter="url(#ambGlow)"/>
  <circle cx="424" cy="620" r="240" fill="#10b981" opacity="0.04" filter="url(#ambGlow)"/>
  <circle cx="424" cy="540" r="240" fill="#8b5cf6" opacity="0.05" filter="url(#ambGlow)"/>

  <!-- Lines: glow pass -->
  <line x1="512" y1="217" x2="512" y2="512" stroke="url(#lnTop)" stroke-width="20" stroke-linecap="round" opacity="0.4" filter="url(#lineGlow)"/>
  <line x1="768" y1="365" x2="512" y2="512" stroke="url(#lnTR)"  stroke-width="20" stroke-linecap="round" opacity="0.4" filter="url(#lineGlow)"/>
  <line x1="768" y1="660" x2="512" y2="512" stroke="url(#lnBR)"  stroke-width="20" stroke-linecap="round" opacity="0.4" filter="url(#lineGlow)"/>
  <line x1="512" y1="807" x2="512" y2="512" stroke="url(#lnBot)" stroke-width="20" stroke-linecap="round" opacity="0.4" filter="url(#lineGlow)"/>
  <line x1="256" y1="660" x2="512" y2="512" stroke="url(#lnBL)"  stroke-width="20" stroke-linecap="round" opacity="0.4" filter="url(#lineGlow)"/>
  <line x1="256" y1="365" x2="512" y2="512" stroke="url(#lnTL)"  stroke-width="20" stroke-linecap="round" opacity="0.4" filter="url(#lineGlow)"/>
  <!-- Lines: crisp pass -->
  <line x1="512" y1="217" x2="512" y2="512" stroke="url(#lnTop)" stroke-width="4" stroke-linecap="round"/>
  <line x1="768" y1="365" x2="512" y2="512" stroke="url(#lnTR)"  stroke-width="4" stroke-linecap="round"/>
  <line x1="768" y1="660" x2="512" y2="512" stroke="url(#lnBR)"  stroke-width="4" stroke-linecap="round"/>
  <line x1="512" y1="807" x2="512" y2="512" stroke="url(#lnBot)" stroke-width="4" stroke-linecap="round"/>
  <line x1="256" y1="660" x2="512" y2="512" stroke="url(#lnBL)"  stroke-width="4" stroke-linecap="round"/>
  <line x1="256" y1="365" x2="512" y2="512" stroke="url(#lnTL)"  stroke-width="4" stroke-linecap="round"/>

  <!--
    Particles: 35% and 65% from each node to center
    Top   (512,217)→(512,512):  35%=(512,320)  65%=(512,409)
    TR    (768,365)→(512,512):  35%=(678,417)  65%=(602,461)
    BR    (768,660)→(512,512):  35%=(678,608)  65%=(602,563)
    Bot   (512,807)→(512,512):  35%=(512,704)  65%=(512,615)
    BL    (256,660)→(512,512):  35%=(346,608)  65%=(422,563)
    TL    (256,365)→(512,512):  35%=(346,417)  65%=(422,461)
  -->
  <circle cx="512" cy="409" r="9"   fill="#22d3ee" opacity="0.9" filter="url(#dotGlow)"/>
  <circle cx="512" cy="320" r="5.5" fill="#06b6d4"  opacity="0.5"/>
  <circle cx="602" cy="461" r="9"   fill="#fbbf24"  opacity="0.9" filter="url(#dotGlow)"/>
  <circle cx="678" cy="417" r="5.5" fill="#f59e0b"  opacity="0.5"/>
  <circle cx="602" cy="563" r="9"   fill="#fb7185"  opacity="0.9" filter="url(#dotGlow)"/>
  <circle cx="678" cy="608" r="5.5" fill="#f43f5e"  opacity="0.5"/>
  <circle cx="512" cy="615" r="9"   fill="#93c5fd"  opacity="0.9" filter="url(#dotGlow)"/>
  <circle cx="512" cy="704" r="5.5" fill="#3b82f6"  opacity="0.5"/>
  <circle cx="422" cy="563" r="9"   fill="#34d399"  opacity="0.9" filter="url(#dotGlow)"/>
  <circle cx="346" cy="608" r="5.5" fill="#10b981"  opacity="0.5"/>
  <circle cx="422" cy="461" r="9"   fill="#c4b5fd"  opacity="0.9" filter="url(#dotGlow)"/>
  <circle cx="346" cy="417" r="5.5" fill="#8b5cf6"  opacity="0.5"/>

  <!-- ========================= NODES (glow r=150, dark r=110, fill r=88) ========================= -->

  <!-- LOCATION — top (512,217) — cyan -->
  <circle cx="512" cy="217" r="150" fill="#06b6d4" opacity="0.15" filter="url(#nodeGlow)"/>
  <circle cx="512" cy="217" r="110" fill="#071c24"/>
  <circle cx="512" cy="217" r="88"  fill="url(#nLoc)"/>
  <!-- Location pin: solid circle head + triangle tail -->
  <circle cx="512" cy="200" r="24" fill="white"/>
  <polygon points="488,215 536,215 512,256" fill="white"/>
  <circle cx="512" cy="200" r="10" fill="#0e7490"/>

  <!-- CALENDAR — top-right (768,365) — amber -->
  <circle cx="768" cy="365" r="150" fill="#f59e0b" opacity="0.15" filter="url(#nodeGlow)"/>
  <circle cx="768" cy="365" r="110" fill="#231a07"/>
  <circle cx="768" cy="365" r="88"  fill="url(#nCal)"/>
  <!-- Calendar: body + header band + day grid -->
  <rect x="737" y="338" width="62" height="54" rx="9" fill="white" opacity="0.15"/>
  <rect x="737" y="338" width="62" height="54" rx="9" fill="none" stroke="white" stroke-width="3.5"/>
  <!-- Header band -->
  <rect x="737" y="338" width="62" height="18" rx="9" fill="white" opacity="0.5"/>
  <rect x="737" y="347" width="62" height="9"  fill="white" opacity="0.5"/>
  <!-- Separator line -->
  <line x1="737" y1="356" x2="799" y2="356" stroke="white" stroke-width="2" opacity="0.4"/>
  <!-- Day dots: 3×2 grid -->
  <circle cx="751" cy="367" r="5.5" fill="white"/>
  <circle cx="768" cy="367" r="5.5" fill="white"/>
  <circle cx="785" cy="367" r="5.5" fill="white"/>
  <circle cx="751" cy="381" r="5.5" fill="white"/>
  <circle cx="768" cy="381" r="5.5" fill="white"/>
  <!-- Highlighted "today" dot -->
  <circle cx="785" cy="381" r="7" fill="white"/>
  <circle cx="785" cy="381" r="4" fill="#b45309"/>

  <!-- MESSAGE — bottom-right (768,660) — rose -->
  <circle cx="768" cy="660" r="150" fill="#f43f5e" opacity="0.15" filter="url(#nodeGlow)"/>
  <circle cx="768" cy="660" r="110" fill="#23070f"/>
  <circle cx="768" cy="660" r="88"  fill="url(#nMsg)"/>
  <!-- Message bubble: plain bubble + two text lines (no dots — center has typing indicator) -->
  <path d="M 733 642 Q 733 632 743 632 L 805 632 Q 815 632 815 642
           L 815 672 Q 815 682 805 682 L 757 682 L 747 695 L 751 682
           Q 733 682 733 672 Z" fill="white"/>
  <!-- Text lines inside bubble -->
  <rect x="745" y="646" width="56" height="7" rx="3.5" fill="#be123c" opacity="0.5"/>
  <rect x="745" y="659" width="40" height="7" rx="3.5" fill="#be123c" opacity="0.35"/>

  <!-- WEATHER — bottom (512,807) — blue -->
  <circle cx="512" cy="807" r="150" fill="#3b82f6" opacity="0.15" filter="url(#nodeGlow)"/>
  <circle cx="512" cy="807" r="110" fill="#07101f"/>
  <circle cx="512" cy="807" r="88"  fill="url(#nWthr)"/>
  <!-- Cloud: 5 overlapping circles, no rect — natural rounded shape -->
  <circle cx="496" cy="810" r="19" fill="white"/>
  <circle cx="510" cy="800" r="23" fill="white"/>
  <circle cx="526" cy="808" r="17" fill="white"/>
  <!-- Two fill circles to close concave gaps at base -->
  <circle cx="503" cy="817" r="14" fill="white"/>
  <circle cx="519" cy="817" r="14" fill="white"/>
  <!-- Rain: slim ellipses, not dots -->
  <ellipse cx="499" cy="839" rx="3.5" ry="8" fill="white" opacity="0.85"/>
  <ellipse cx="513" cy="844" rx="3.5" ry="8" fill="white" opacity="0.85"/>
  <ellipse cx="527" cy="839" rx="3.5" ry="8" fill="white" opacity="0.85"/>

  <!-- BATTERY — bottom-left (256,660) — emerald -->
  <circle cx="256" cy="660" r="150" fill="#10b981" opacity="0.15" filter="url(#nodeGlow)"/>
  <circle cx="256" cy="660" r="110" fill="#071c13"/>
  <circle cx="256" cy="660" r="88"  fill="url(#nBat)"/>
  <!-- Battery: body (56x32) + terminal nub + charge fill -->
  <rect x="227" y="644" width="56" height="32" rx="8" fill="white" opacity="0.15"/>
  <rect x="227" y="644" width="56" height="32" rx="8" fill="none" stroke="white" stroke-width="3.5"/>
  <!-- Terminal nub -->
  <rect x="283" y="652" width="9" height="16" rx="4" fill="white"/>
  <!-- Charge fill (≈70%) — rounded inside the body -->
  <rect x="231" y="648" width="36" height="24" rx="5" fill="white"/>

  <!-- HISTORY — top-left (256,365) — violet -->
  <circle cx="256" cy="365" r="150" fill="#8b5cf6" opacity="0.15" filter="url(#nodeGlow)"/>
  <circle cx="256" cy="365" r="110" fill="#130e23"/>
  <circle cx="256" cy="365" r="88"  fill="url(#nHist)"/>
  <!-- Clock icon: circle face + hour/minute hands = "history" -->
  <circle cx="256" cy="365" r="32" fill="none" stroke="white" stroke-width="4"/>
  <circle cx="256" cy="365" r="4"  fill="white"/>
  <!-- Minute hand: pointing to 12 (up) -->
  <line x1="256" y1="365" x2="256" y2="339" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Hour hand: pointing to ~10 -->
  <line x1="256" y1="365" x2="239" y2="352" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Counter-clockwise arc hint (history = going back in time) -->
  <path d="M 246 337 A 20 20 0 0 0 236 345" fill="none"
        stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <polygon points="242,333 246,342 252,336" fill="white"/>

  <!-- ====================== CENTRAL: TYPING INDICATOR ====================== -->
  <!--
    Bubble body: 230x120, centered at (512,500)
    x=397 y=442 → corners at rx≈28 via quadratic bezier
    Tail: bottom-left, pointing down — "AI is composing a reply"
  -->
  <!-- Soft ambient glow -->
  <circle cx="512" cy="498" r="160" fill="white" opacity="0.06" filter="url(#orbHalo)"/>
  <!-- Bubble -->
  <path d="M 397 470 Q 397 442 425 442 L 599 442 Q 627 442 627 470
           L 627 534 Q 627 562 599 562 L 444 562 L 428 598 L 435 562
           Q 397 562 397 534 Z"
        fill="white" filter="url(#orbHalo)"/>
  <!-- Top shimmer -->
  <path d="M 397 470 Q 397 442 425 442 L 599 442 Q 627 442 627 470
           L 627 478 Q 397 478 397 470 Z"
        fill="white" opacity="0.22"/>
  <!-- Three dots: y=502, spaced 44px, r=15 -->
  <circle cx="468" cy="502" r="15" fill="#6366f1" filter="url(#dotGlow)"/>
  <circle cx="512" cy="502" r="15" fill="#6366f1" filter="url(#dotGlow)"/>
  <circle cx="556" cy="502" r="15" fill="#6366f1" filter="url(#dotGlow)"/>
</svg>
