<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#130828"/>
      <stop offset="100%" stop-color="#09090b"/>
    </radialGradient>

    <!--
      Lines extended to canvas edges — hex directions hit the viewBox boundary at:
        Top          (512,    0)
        Top-right    (1024, 216)
        Bottom-right (1024, 808)
        Bottom       (512, 1024)
        Bottom-left  (   0, 808)
        Top-left     (   0, 216)
    -->
    <linearGradient id="lnTop" x1="512" y1="0"    x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.15"/><stop offset="100%" stop-color="#e0f2fe" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="lnTR"  x1="1024" y1="216" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.15"/><stop offset="100%" stop-color="#fef3c7" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="lnBR"  x1="1024" y1="808" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f43f5e" stop-opacity="0.15"/><stop offset="100%" stop-color="#ffe4e6" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="lnBot" x1="512" y1="1024" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15"/><stop offset="100%" stop-color="#dbeafe" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="lnBL"  x1="0"    y1="808" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.15"/><stop offset="100%" stop-color="#d1fae5" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="lnTL"  x1="0"    y1="216" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.15"/><stop offset="100%" stop-color="#ede9fe" stop-opacity="0.9"/>
    </linearGradient>

    <filter id="ambGlow"  x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="60"/></filter>
    <filter id="lineGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dotGlow"  x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="232" fill="url(#bg)"/>

  <!-- Ambient centre glow -->
  <circle cx="512" cy="505" r="340" fill="#6d28d9" opacity="0.16" filter="url(#ambGlow)"/>

  <!--
    Connector lines — inner endpoints computed from intersection with the
    bubble's rounded-rect boundary (cr=85), backed off 20px to clear the 12px border.
      Top  stop: (512, 243)     TR  stop: (849, 317)
      BR   stop: (845, 705)     Bot stop: (512, 767)
      BL   stop: (179, 705)     TL  stop: (175, 317)
  -->
  <!-- Glow pass -->
  <line x1="512"  y1="0"    x2="512" y2="243" stroke="url(#lnTop)" stroke-width="22" stroke-linecap="round" opacity="0.4" filter="url(#lineGlow)"/>
  <line x1="1024" y1="216"  x2="849" y2="317" stroke="url(#lnTR)"  stroke-width="22" stroke-linecap="round" opacity="0.4" filter="url(#lineGlow)"/>
  <line x1="1024" y1="808"  x2="845" y2="705" stroke="url(#lnBR)"  stroke-width="22" stroke-linecap="round" opacity="0.4" filter="url(#lineGlow)"/>
  <line x1="512"  y1="1024" x2="512" y2="767" stroke="url(#lnBot)" stroke-width="22" stroke-linecap="round" opacity="0.4" filter="url(#lineGlow)"/>
  <line x1="0"    y1="808"  x2="179" y2="705" stroke="url(#lnBL)"  stroke-width="22" stroke-linecap="round" opacity="0.4" filter="url(#lineGlow)"/>
  <line x1="0"    y1="216"  x2="175" y2="317" stroke="url(#lnTL)"  stroke-width="22" stroke-linecap="round" opacity="0.4" filter="url(#lineGlow)"/>
  <!-- Crisp pass -->
  <line x1="512"  y1="0"    x2="512" y2="243" stroke="url(#lnTop)" stroke-width="4" stroke-linecap="round"/>
  <line x1="1024" y1="216"  x2="849" y2="317" stroke="url(#lnTR)"  stroke-width="4" stroke-linecap="round"/>
  <line x1="1024" y1="808"  x2="845" y2="705" stroke="url(#lnBR)"  stroke-width="4" stroke-linecap="round"/>
  <line x1="512"  y1="1024" x2="512" y2="767" stroke="url(#lnBot)" stroke-width="4" stroke-linecap="round"/>
  <line x1="0"    y1="808"  x2="179" y2="705" stroke="url(#lnBL)"  stroke-width="4" stroke-linecap="round"/>
  <line x1="0"    y1="216"  x2="175" y2="317" stroke="url(#lnTL)"  stroke-width="4" stroke-linecap="round"/>

  <!--
    Central typing bubble — previous ×1.2 (bubble 645×484):
    x: 189–835   y: 263–747   corner radius 85
    Tail: centre x=618, width doubled (×2 = 124px), depth doubled (×2 = 152px), tip y=899
  -->
  <!-- Bubble dark fill -->
  <path d="M 189 348 Q 189 263 274 263 L 750 263 Q 835 263 835 348
           L 835 662 Q 835 747 750 747 L 680 747 L 618 899 L 556 747
           L 274 747 Q 189 747 189 662 Z"
        fill="#0d0a1e"/>
  <!-- White border -->
  <path d="M 189 348 Q 189 263 274 263 L 750 263 Q 835 263 835 348
           L 835 662 Q 835 747 750 747 L 680 747 L 618 899 L 556 747
           L 274 747 Q 189 747 189 662 Z"
        fill="none" stroke="white" stroke-width="12" stroke-opacity="0.45"/>
  <!-- Top-edge glass shimmer -->
  <path d="M 189 348 Q 189 263 274 263 L 750 263 Q 835 263 835 348
           L 835 369 Q 189 369 189 348 Z"
        fill="white" opacity="0.10"/>
  <!-- Three typing dots — y midpoint (263+747)/2=505, r=41, spacing 118px -->
  <circle cx="394" cy="505" r="41" fill="white" filter="url(#dotGlow)"/>
  <circle cx="512" cy="505" r="41" fill="white" filter="url(#dotGlow)"/>
  <circle cx="630" cy="505" r="41" fill="white" filter="url(#dotGlow)"/>

  <!--
    Data particles — t=0.30 from each canvas-edge endpoint, outside new bubble.
    Top  (512,  154)  TR  (870, 305)  BR  (870, 719)
    Bot  (512,  870)  BL  (154, 719)  TL  (154, 305)
  -->
  <circle cx="512" cy="154" r="15" fill="#22d3ee" opacity="0.95" filter="url(#dotGlow)"/>
  <circle cx="870" cy="305" r="15" fill="#fbbf24" opacity="0.95" filter="url(#dotGlow)"/>
  <circle cx="870" cy="719" r="15" fill="#fb7185" opacity="0.95" filter="url(#dotGlow)"/>
  <circle cx="512" cy="870" r="15" fill="#93c5fd" opacity="0.95" filter="url(#dotGlow)"/>
  <circle cx="154" cy="719" r="15" fill="#34d399" opacity="0.95" filter="url(#dotGlow)"/>
  <circle cx="154" cy="305" r="15" fill="#c4b5fd" opacity="0.95" filter="url(#dotGlow)"/>
</svg>
