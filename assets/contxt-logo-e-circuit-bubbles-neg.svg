<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#f0ecff"/>
      <stop offset="100%" stop-color="#faf9ff"/>
    </radialGradient>

    <clipPath id="iconClip">
      <rect width="1024" height="1024" rx="232"/>
    </clipPath>
  </defs>

  <rect width="1024" height="1024" rx="232" fill="url(#bg)"/>

  <g clip-path="url(#iconClip)">

    <!-- Single speech bubble: bold flat white fill, thick comic-style dark outline -->
    <path d="M 189 348 Q 189 263 274 263 L 750 263 Q 835 263 835 348
             L 835 662 Q 835 747 750 747 L 680 747 L 618 899 L 556 747
             L 274 747 Q 189 747 189 662 Z"
          fill="#ffffff" stroke="#1a1033" stroke-width="38" stroke-linejoin="round"/>

    <!-- Circuit traces: dark outline pass underneath, flat bold colour on top -->
    <g fill="none" stroke="#1a1033" stroke-width="26" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 512 505 L 400 505 L 400 380 L 340 380"/>
      <path d="M 512 505 L 284 505"/>
      <path d="M 512 505 L 624 505 L 624 380 L 684 380"/>
      <path d="M 512 505 L 700 505 L 700 520 L 740 520"/>
      <path d="M 512 505 L 620 505 L 620 650"/>
      <path d="M 512 505 L 404 505 L 404 650"/>
    </g>
    <path d="M 512 505 L 400 505 L 400 380 L 340 380" fill="none" stroke="#0891b2"
          stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 512 505 L 284 505" fill="none" stroke="#0891b2"
          stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 512 505 L 624 505 L 624 380 L 684 380" fill="none" stroke="#d97706"
          stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 512 505 L 700 505 L 700 520 L 740 520" fill="none" stroke="#d97706"
          stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 512 505 L 620 505 L 620 650" fill="none" stroke="#e11d48"
          stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 512 505 L 404 505 L 404 650" fill="none" stroke="#059669"
          stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Via nodes at trace bends -->
    <circle cx="400" cy="505" r="16" fill="#8b5cf6" stroke="#1a1033" stroke-width="8"/>
    <circle cx="624" cy="505" r="16" fill="#8b5cf6" stroke="#1a1033" stroke-width="8"/>
    <circle cx="700" cy="505" r="16" fill="#8b5cf6" stroke="#1a1033" stroke-width="8"/>

    <!-- Endpoint nodes -->
    <circle cx="340" cy="380" r="28" fill="#0891b2" stroke="#1a1033" stroke-width="9"/>
    <circle cx="284" cy="505" r="28" fill="#0891b2" stroke="#1a1033" stroke-width="9"/>
    <circle cx="684" cy="380" r="28" fill="#d97706" stroke="#1a1033" stroke-width="9"/>
    <circle cx="740" cy="520" r="28" fill="#d97706" stroke="#1a1033" stroke-width="9"/>
    <circle cx="620" cy="650" r="28" fill="#e11d48" stroke="#1a1033" stroke-width="9"/>
    <circle cx="404" cy="650" r="28" fill="#059669" stroke="#1a1033" stroke-width="9"/>

    <!-- Central hub -->
    <circle cx="512" cy="505" r="44" fill="#7c3aed" stroke="#1a1033" stroke-width="10"/>

  </g>
</svg>
