<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#130828"/>
      <stop offset="100%" stop-color="#09090b"/>
    </radialGradient>

    <clipPath id="iconClip">
      <rect width="1024" height="1024" rx="232"/>
    </clipPath>

    <linearGradient id="traceGradA" x1="512" y1="505" x2="284" y2="505" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
    <linearGradient id="traceGradB" x1="512" y1="505" x2="740" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="traceGradC" x1="512" y1="505" x2="620" y2="650" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
    <linearGradient id="traceGradD" x1="512" y1="505" x2="404" y2="650" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>

    <filter id="ambGlow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="60"/></filter>
    <filter id="nodeGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="traceGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="232" fill="url(#bg)"/>

  <g clip-path="url(#iconClip)">

    <!-- Ambient centre glow -->
    <circle cx="512" cy="505" r="320" fill="#6d28d9" opacity="0.18" filter="url(#ambGlow)"/>

    <!-- Single speech bubble, dark chip-like fill so circuitry reads clearly inside it -->
    <path d="M 189 348 Q 189 263 274 263 L 750 263 Q 835 263 835 348
             L 835 662 Q 835 747 750 747 L 680 747 L 618 899 L 556 747
             L 274 747 Q 189 747 189 662 Z"
          fill="#170f30"/>
    <path d="M 189 348 Q 189 263 274 263 L 750 263 Q 835 263 835 348
             L 835 662 Q 835 747 750 747 L 680 747 L 618 899 L 556 747
             L 274 747 Q 189 747 189 662 Z"
          fill="none" stroke="white" stroke-width="24" stroke-opacity="0.85" stroke-linejoin="round"/>

    <!-- Circuit traces fanning from a central hub to six nodes inside the bubble -->
    <path d="M 512 505 L 400 505 L 400 380 L 340 380" fill="none" stroke="url(#traceGradA)"
          stroke-width="9" stroke-linecap="round" stroke-linejoin="round" filter="url(#traceGlow)"/>
    <path d="M 512 505 L 284 505" fill="none" stroke="url(#traceGradA)"
          stroke-width="9" stroke-linecap="round" stroke-linejoin="round" filter="url(#traceGlow)"/>
    <path d="M 512 505 L 624 505 L 624 380 L 684 380" fill="none" stroke="url(#traceGradB)"
          stroke-width="9" stroke-linecap="round" stroke-linejoin="round" filter="url(#traceGlow)"/>
    <path d="M 512 505 L 700 505 L 700 520 L 740 520" fill="none" stroke="url(#traceGradB)"
          stroke-width="9" stroke-linecap="round" stroke-linejoin="round" filter="url(#traceGlow)"/>
    <path d="M 512 505 L 620 505 L 620 650" fill="none" stroke="url(#traceGradC)"
          stroke-width="9" stroke-linecap="round" stroke-linejoin="round" filter="url(#traceGlow)"/>
    <path d="M 512 505 L 404 505 L 404 650" fill="none" stroke="url(#traceGradD)"
          stroke-width="9" stroke-linecap="round" stroke-linejoin="round" filter="url(#traceGlow)"/>

    <!-- Via nodes at trace bends -->
    <circle cx="400" cy="505" r="9" fill="#c4b5fd" filter="url(#nodeGlow)"/>
    <circle cx="624" cy="505" r="9" fill="#c4b5fd" filter="url(#nodeGlow)"/>
    <circle cx="700" cy="505" r="9" fill="#c4b5fd" filter="url(#nodeGlow)"/>

    <!-- Endpoint nodes -->
    <circle cx="340" cy="380" r="16" fill="#67e8f9" filter="url(#nodeGlow)"/>
    <circle cx="284" cy="505" r="16" fill="#67e8f9" filter="url(#nodeGlow)"/>
    <circle cx="684" cy="380" r="16" fill="#fbbf24" filter="url(#nodeGlow)"/>
    <circle cx="740" cy="520" r="16" fill="#fbbf24" filter="url(#nodeGlow)"/>
    <circle cx="620" cy="650" r="16" fill="#fb7185" filter="url(#nodeGlow)"/>
    <circle cx="404" cy="650" r="16" fill="#34d399" filter="url(#nodeGlow)"/>

    <!-- Central hub -->
    <circle cx="512" cy="505" r="26" fill="#a78bfa" filter="url(#nodeGlow)"/>

  </g>
</svg>
