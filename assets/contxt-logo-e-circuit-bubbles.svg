<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#130828"/>
      <stop offset="100%" stop-color="#09090b"/>
    </radialGradient>

    <clipPath id="iconClip">
      <rect width="1024" height="1024" rx="232"/>
    </clipPath>

    <linearGradient id="copper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e7c789"/>
      <stop offset="100%" stop-color="#a9783f"/>
    </linearGradient>
    <linearGradient id="chipBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e1638"/>
      <stop offset="100%" stop-color="#0b0716"/>
    </linearGradient>

    <filter id="ambGlow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="60"/></filter>
    <filter id="softGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="232" fill="url(#bg)"/>

  <g clip-path="url(#iconClip)">

    <!-- Ambient centre glow -->
    <circle cx="512" cy="505" r="320" fill="#6d28d9" opacity="0.16" filter="url(#ambGlow)"/>

    <!-- Single speech bubble, dark PCB-substrate fill so circuitry reads clearly inside it -->
    <path d="M 189 348 Q 189 263 274 263 L 750 263 Q 835 263 835 348
             L 835 662 Q 835 747 750 747 L 680 747 L 618 899 L 556 747
             L 274 747 Q 189 747 189 662 Z"
          fill="#170f30"/>
    <path d="M 189 348 Q 189 263 274 263 L 750 263 Q 835 263 835 348
             L 835 662 Q 835 747 750 747 L 680 747 L 618 899 L 556 747
             L 274 747 Q 189 747 189 662 Z"
          fill="none" stroke="white" stroke-width="24" stroke-opacity="0.85" stroke-linejoin="round"/>

    <!-- Faint silkscreen grid hinting at a PCB substrate -->
    <g stroke="#3a2d63" stroke-width="1.5" opacity="0.35">
      <line x1="260" y1="330" x2="260" y2="690"/>
      <line x1="370" y1="310" x2="370" y2="710"/>
      <line x1="650" y1="310" x2="650" y2="710"/>
      <line x1="760" y1="330" x2="760" y2="690"/>
      <line x1="230" y1="420" x2="800" y2="420"/>
      <line x1="230" y1="600" x2="800" y2="600"/>
    </g>

    <!-- Copper traces routed with multiple right-angle bends, varied gauge like real signal/power runs -->
    <path d="M 487 475 L 487 420 L 400 420 L 400 380 L 340 380" fill="none" stroke="url(#copper)"
          stroke-width="6" stroke-linecap="square" stroke-linejoin="miter"/>
    <path d="M 467 505 L 284 505" fill="none" stroke="url(#copper)"
          stroke-width="10" stroke-linecap="square" stroke-linejoin="miter"/>
    <path d="M 537 475 L 537 420 L 624 420 L 624 380 L 684 380" fill="none" stroke="url(#copper)"
          stroke-width="6" stroke-linecap="square" stroke-linejoin="miter"/>
    <path d="M 557 505 L 700 505 L 700 520 L 740 520" fill="none" stroke="url(#copper)"
          stroke-width="10" stroke-linecap="square" stroke-linejoin="miter"/>
    <path d="M 537 535 L 537 580 L 620 580 L 620 650" fill="none" stroke="url(#copper)"
          stroke-width="6" stroke-linecap="square" stroke-linejoin="miter"/>
    <path d="M 487 535 L 487 580 L 404 580 L 404 650" fill="none" stroke="url(#copper)"
          stroke-width="6" stroke-linecap="square" stroke-linejoin="miter"/>

    <!-- Resistor symbol inline on the left power trace -->
    <g transform="translate(355,505)">
      <rect x="-26" y="-9" width="52" height="18" rx="3" fill="#241a44" stroke="url(#copper)" stroke-width="3"/>
      <path d="M -16 -5 L -10 5 L -2 -5 L 6 5 L 14 -5" fill="none" stroke="#e7c789" stroke-width="2.5"/>
    </g>

    <!-- Plated through-hole vias at trace bends -->
    <circle cx="400" cy="420" r="9" fill="url(#copper)"/><circle cx="400" cy="420" r="4" fill="#170f30"/>
    <circle cx="624" cy="420" r="9" fill="url(#copper)"/><circle cx="624" cy="420" r="4" fill="#170f30"/>
    <circle cx="700" cy="505" r="9" fill="url(#copper)"/><circle cx="700" cy="505" r="4" fill="#170f30"/>
    <circle cx="537" cy="580" r="9" fill="url(#copper)"/><circle cx="537" cy="580" r="4" fill="#170f30"/>
    <circle cx="487" cy="580" r="9" fill="url(#copper)"/><circle cx="487" cy="580" r="4" fill="#170f30"/>

    <!-- SMD solder pads at the six terminating components -->
    <g stroke="#0b0716" stroke-width="2.5">
      <rect x="320" y="368" width="40" height="24" rx="4" fill="#67e8f9"/>
      <rect x="264" y="493" width="40" height="24" rx="4" fill="#67e8f9"/>
      <rect x="664" y="368" width="40" height="24" rx="4" fill="#fbbf24"/>
      <rect x="720" y="508" width="40" height="24" rx="4" fill="#fbbf24"/>
      <rect x="600" y="638" width="40" height="24" rx="4" fill="#fb7185"/>
      <rect x="384" y="638" width="40" height="24" rx="4" fill="#34d399"/>
    </g>

    <!-- Central IC chip with six labelled pins -->
    <rect x="467" y="475" width="90" height="60" rx="6" fill="url(#chipBody)" stroke="#c9b8f0" stroke-width="3"/>
    <circle cx="481" cy="489" r="3.5" fill="#c9b8f0"/>
    <line x1="492" y1="505" x2="532" y2="505" stroke="#3a2d63" stroke-width="2"/>

  </g>
</svg>
