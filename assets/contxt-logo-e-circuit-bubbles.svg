<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#130828"/>
      <stop offset="100%" stop-color="#09090b"/>
    </radialGradient>

    <clipPath id="iconClip">
      <rect width="1024" height="1024" rx="232"/>
    </clipPath>

    <linearGradient id="traceGrad" x1="180" y1="460" x2="720" y2="460" gradientUnits="userSpaceOnUse">
      <stop offset="0%"  stop-color="#67e8f9"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>

    <filter id="ambGlow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="60"/></filter>
    <filter id="nodeGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="traceGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="232" fill="url(#bg)"/>

  <g clip-path="url(#iconClip)">

    <!-- Ambient centre glow behind the overlap -->
    <circle cx="512" cy="460" r="260" fill="#6d28d9" opacity="0.18" filter="url(#ambGlow)"/>

    <!--
      Two speech-bubble outlines, overlapping in the centre (x 444–580).
      Stroke only — dark background shows through so the outlines read
      as interlocking rings, like the reference image.
    -->
    <!-- Left bubble: x 120–580, y 270–650, cr 90, tail down-left -->
    <path d="M 120 360 Q 120 270 210 270 L 490 270 Q 580 270 580 360
             L 580 560 Q 580 650 490 650 L 270 650 L 150 760 L 190 650
             L 210 650 Q 120 650 120 560 Z"
          fill="none" stroke="white" stroke-width="22" stroke-opacity="0.9" stroke-linejoin="round"/>
    <!-- Right bubble: x 444–904, y 270–650, cr 90, tail down-right -->
    <path d="M 444 360 Q 444 270 534 270 L 814 270 Q 904 270 904 360
             L 904 560 Q 904 650 814 650 L 834 650 L 874 760 L 754 650
             L 534 650 Q 444 650 444 560 Z"
          fill="none" stroke="white" stroke-width="22" stroke-opacity="0.9" stroke-linejoin="round"/>

    <!--
      Circuit trace linking the two bubbles through the overlap zone.
      Two small entry nodes merge into a stepped PCB-style trace that
      exits into the right bubble.
    -->
    <path d="M 210 430 L 270 460 L 350 460 L 350 540 L 512 540 L 512 460 L 700 460
             M 210 490 L 270 460"
          fill="none" stroke="url(#traceGrad)" stroke-width="9" stroke-linecap="round"
          stroke-linejoin="round" filter="url(#traceGlow)"/>

    <!-- Nodes along the trace -->
    <circle cx="210" cy="430" r="13" fill="#67e8f9" filter="url(#nodeGlow)"/>
    <circle cx="210" cy="490" r="13" fill="#67e8f9" filter="url(#nodeGlow)"/>
    <circle cx="350" cy="460" r="10" fill="#818cf8" filter="url(#nodeGlow)"/>
    <circle cx="512" cy="540" r="10" fill="#818cf8" filter="url(#nodeGlow)"/>
    <circle cx="512" cy="460" r="10" fill="#a78bfa" filter="url(#nodeGlow)"/>
    <circle cx="700" cy="460" r="18" fill="#c4b5fd" filter="url(#nodeGlow)"/>

  </g>
</svg>
