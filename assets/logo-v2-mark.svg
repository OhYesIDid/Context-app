<?xml version="1.0" encoding="UTF-8"?>
<!-- ProTxt — V2 Lettermark (P with tail as speech bubble) -->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="42%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#130d2e"/>
      <stop offset="100%" stop-color="#09090b"/>
    </radialGradient>

    <radialGradient id="letterGrad" cx="30%" cy="28%" r="72%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="45%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </radialGradient>

    <filter id="letterGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="22" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="ambGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>

    <linearGradient id="highlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <clipPath id="letterClip">
      <!-- Clip region for highlight overlay — same as letter shape -->
      <rect x="180" y="120" width="664" height="784" rx="0"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="232" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <ellipse cx="480" cy="480" rx="280" ry="280" fill="#6d28d9" opacity="0.18" filter="url(#ambGlow)"/>

  <!--
    Custom P path:
    The P is designed so its bowl reads as a speech bubble (rounded right side),
    and the foot of the stem curves out as a natural "tail".

    Stem: vertical bar left side, x=180-300, y=120-760
    Bowl: large circle attached to top-right of stem
    Tail: the foot of the stem curves right like a speech bubble tail
  -->

  <!-- P shape: stem + bowl + speech-bubble tail -->
  <path d="
    M 260 120
    L 420 120
    Q 700 120 700 340
    Q 700 560 420 560
    L 380 560
    L 380 700
    C 380 740 400 760 380 760
    C 340 760 220 840 180 900
    C 240 820 300 760 300 720
    L 300 120
    Z

    M 380 200
    L 420 200
    Q 608 200 608 340
    Q 608 480 420 480
    L 380 480
    Z
  " fill="url(#letterGrad)"
     fill-rule="evenodd"
     filter="url(#letterGlow)"/>

  <!-- Highlight overlay (top-left lit) -->
  <path d="
    M 260 120
    L 420 120
    Q 700 120 700 340
    Q 700 400 650 450
    Q 580 260 380 240
    L 380 200
    L 420 200
    Q 540 200 590 300
    Q 590 220 420 200
    L 300 200
    L 300 120
    Z
  " fill="url(#highlight)"/>

  <!-- Thin edge highlight on P stem top -->
  <rect x="300" y="120" width="1" height="100" fill="white" opacity="0.3"/>
</svg>
