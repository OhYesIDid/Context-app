<?xml version="1.0" encoding="UTF-8"?>
<!--
  ConTxt — Concept B: "Liquid Glass Bubble"
  iOS 26-inspired frosted glass speech bubble. Translucent violet fill,
  white refraction highlight, smooth bezier tail, sparkle inside.
  Research basis: iOS 26 Liquid Glass aesthetic, glassmorphism trend,
  single hero element, depth through layering.
-->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Rich dark background with purple tint -->
    <radialGradient id="bg" cx="42%" cy="38%" r="64%">
      <stop offset="0%" stop-color="#1a0f3d"/>
      <stop offset="100%" stop-color="#09090b"/>
    </radialGradient>

    <!-- Glass fill: indigo tint at medium opacity -->
    <radialGradient id="glassFill" cx="30%" cy="25%" r="75%">
      <stop offset="0%"   stop-color="#a5b4fc" stop-opacity="0.85"/>
      <stop offset="45%"  stop-color="#6366f1" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#3730a3" stop-opacity="0.80"/>
    </radialGradient>

    <!-- Lens flare / refraction on upper-left -->
    <radialGradient id="lensFlare" cx="28%" cy="22%" r="55%">
      <stop offset="0%"   stop-color="white" stop-opacity="0.38"/>
      <stop offset="50%"  stop-color="white" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <!-- Bottom darkening for depth -->
    <linearGradient id="depthGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000"  stop-opacity="0.22"/>
    </linearGradient>

    <!-- Ambient glow -->
    <filter id="ambGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="50"/>
    </filter>

    <!-- Bubble shadow -->
    <filter id="bubbleShadow" x="-10%" y="-6%" width="126%" height="128%">
      <feDropShadow dx="0" dy="18" stdDeviation="36"
                    flood-color="#4c1d95" flood-opacity="0.55"/>
    </filter>

    <!-- Sparkle glow -->
    <filter id="sparkGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="232" fill="url(#bg)"/>

  <!-- Ambient purple cloud -->
  <ellipse cx="512" cy="420" rx="310" ry="250"
           fill="#6d28d9" opacity="0.22" filter="url(#ambGlow)"/>

  <!-- Bubble tail (drawn first, behind rect) -->
  <path d="M 610 674 C 635 722 706 808 758 874
           C 712 812 658 742 658 674 Z"
        fill="#4338ca"/>

  <!-- Bubble body: frosted glass layer stack -->
  <!-- 1. Base glass fill -->
  <rect x="154" y="144" width="716" height="530" rx="96"
        fill="url(#glassFill)" filter="url(#bubbleShadow)"/>

  <!-- 2. Depth gradient overlay -->
  <rect x="154" y="144" width="716" height="530" rx="96"
        fill="url(#depthGrad)"/>

  <!-- 3. Lens flare / top-left light refraction -->
  <rect x="154" y="144" width="716" height="530" rx="96"
        fill="url(#lensFlare)"/>

  <!-- 4. Bright edge highlight: top-left arc (light catching the glass rim) -->
  <path d="M 176 244 Q 176 164 254 164 L 680 164
           Q 762 164 840 210 Q 840 164 770 144 L 250 144
           Q 154 144 154 244 Z"
        fill="white" opacity="0.22"/>

  <!-- 5. Thin inner border (glass edge effect) -->
  <rect x="155" y="145" width="714" height="528" rx="95"
        fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.30"/>

  <!--
    4-pointed sparkle center: (512, 409) — center of bubble
    outer r=104, inner r=40
    Outer: top(512,305) right(616,409) bottom(512,513) left(408,409)
    Inner (45°, r=40 → offset=28): (540,381)(540,437)(484,437)(484,381)
  -->
  <path d="M 512 305 L 540 381 L 616 409
           L 540 437 L 512 513
           L 484 437 L 408 409
           L 484 381 Z"
        fill="white" filter="url(#sparkGlow)"/>

  <!-- Secondary micro-sparkle (depth) -->
  <circle cx="740" cy="540" r="5" fill="white" opacity="0.40"/>
  <circle cx="760" cy="515" r="3" fill="white" opacity="0.25"/>
</svg>
