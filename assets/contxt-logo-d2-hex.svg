<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#130828"/>
      <stop offset="100%" stop-color="#09090b"/>
    </radialGradient>

    <radialGradient id="nodeFill" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </radialGradient>

    <radialGradient id="centerPulse" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ddd6fe"/>
      <stop offset="60%"  stop-color="#7c3aed" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4c1d95" stop-opacity="0"/>
    </radialGradient>

    <!--
      Regular hexagon, r=240 from (512,512):
        Top          (512, 272)   0 deg
        Top-right    (720, 392)   60 deg
        Bottom-right (720, 632)  120 deg
        Bottom       (512, 752)  180 deg
        Bottom-left  (304, 632)  240 deg
        Top-left     (304, 392)  300 deg
    -->
    <linearGradient id="lnTop" x1="512" y1="272" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="lnTR" x1="720" y1="392" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="lnBR" x1="720" y1="632" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="lnBot" x1="512" y1="752" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="lnBL" x1="304" y1="632" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="lnTL" x1="304" y1="392" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0.9"/>
    </linearGradient>

    <filter id="ambGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
    <filter id="nodeGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="lineGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="centerGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dotGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="232" fill="url(#bg)"/>

  <!-- Ambient center glow -->
  <circle cx="512" cy="512" r="280" fill="#6d28d9" opacity="0.18" filter="url(#ambGlow)"/>

  <!-- Connection lines: glow pass -->
  <line x1="512" y1="272" x2="512" y2="512" stroke="url(#lnTop)" stroke-width="7" stroke-linecap="round" opacity="0.3" filter="url(#lineGlow)"/>
  <line x1="720" y1="392" x2="512" y2="512" stroke="url(#lnTR)"  stroke-width="7" stroke-linecap="round" opacity="0.3" filter="url(#lineGlow)"/>
  <line x1="720" y1="632" x2="512" y2="512" stroke="url(#lnBR)"  stroke-width="7" stroke-linecap="round" opacity="0.3" filter="url(#lineGlow)"/>
  <line x1="512" y1="752" x2="512" y2="512" stroke="url(#lnBot)" stroke-width="7" stroke-linecap="round" opacity="0.3" filter="url(#lineGlow)"/>
  <line x1="304" y1="632" x2="512" y2="512" stroke="url(#lnBL)"  stroke-width="7" stroke-linecap="round" opacity="0.3" filter="url(#lineGlow)"/>
  <line x1="304" y1="392" x2="512" y2="512" stroke="url(#lnTL)"  stroke-width="7" stroke-linecap="round" opacity="0.3" filter="url(#lineGlow)"/>
  <!-- Connection lines: crisp pass -->
  <line x1="512" y1="272" x2="512" y2="512" stroke="url(#lnTop)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="720" y1="392" x2="512" y2="512" stroke="url(#lnTR)"  stroke-width="1.5" stroke-linecap="round"/>
  <line x1="720" y1="632" x2="512" y2="512" stroke="url(#lnBR)"  stroke-width="1.5" stroke-linecap="round"/>
  <line x1="512" y1="752" x2="512" y2="512" stroke="url(#lnBot)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="304" y1="632" x2="512" y2="512" stroke="url(#lnBL)"  stroke-width="1.5" stroke-linecap="round"/>
  <line x1="304" y1="392" x2="512" y2="512" stroke="url(#lnTL)"  stroke-width="1.5" stroke-linecap="round"/>

  <!--
    Data-flow particles: bright dot at 65% from node, dim dot at 35%
    Top   (512,272)→(512,512): 65%=(512,428) 35%=(512,356)
    TR    (720,392)→(512,512): 65%=(576,470) 35%=(648,434)
    BR    (720,632)→(512,512): 65%=(576,554) 35%=(648,590)
    Bot   (512,752)→(512,512): 65%=(512,596) 35%=(512,668)
    BL    (304,632)→(512,512): 65%=(448,554) 35%=(376,590)
    TL    (304,392)→(512,512): 65%=(448,470) 35%=(376,434)
  -->
  <circle cx="512" cy="428" r="3.5" fill="#c4b5fd" opacity="0.85" filter="url(#dotGlow)"/>
  <circle cx="512" cy="356" r="2"   fill="#818cf8"  opacity="0.4"/>
  <circle cx="576" cy="470" r="3.5" fill="#c4b5fd" opacity="0.85" filter="url(#dotGlow)"/>
  <circle cx="648" cy="434" r="2"   fill="#818cf8"  opacity="0.4"/>
  <circle cx="576" cy="554" r="3.5" fill="#c4b5fd" opacity="0.85" filter="url(#dotGlow)"/>
  <circle cx="648" cy="590" r="2"   fill="#818cf8"  opacity="0.4"/>
  <circle cx="512" cy="596" r="3.5" fill="#c4b5fd" opacity="0.85" filter="url(#dotGlow)"/>
  <circle cx="512" cy="668" r="2"   fill="#818cf8"  opacity="0.4"/>
  <circle cx="448" cy="554" r="3.5" fill="#c4b5fd" opacity="0.85" filter="url(#dotGlow)"/>
  <circle cx="376" cy="590" r="2"   fill="#818cf8"  opacity="0.4"/>
  <circle cx="448" cy="470" r="3.5" fill="#c4b5fd" opacity="0.85" filter="url(#dotGlow)"/>
  <circle cx="376" cy="434" r="2"   fill="#818cf8"  opacity="0.4"/>

  <!-- ========================= NODES ========================= -->

  <!-- NODE: Location — top (512, 272) -->
  <circle cx="512" cy="272" r="50" fill="#6366f1" opacity="0.12" filter="url(#nodeGlow)"/>
  <circle cx="512" cy="272" r="35" fill="#1a1740"/>
  <circle cx="512" cy="272" r="27" fill="url(#nodeFill)"/>
  <!-- Pin: circle head (512,264), teardrop tip at (512,285) -->
  <path d="M 503 264 A 9 9 0 1 1 521 264 L 512 285 Z" fill="white"/>
  <circle cx="512" cy="264" r="4" fill="#4338ca"/>

  <!-- NODE: Calendar — top-right (720, 392) -->
  <circle cx="720" cy="392" r="50" fill="#6366f1" opacity="0.12" filter="url(#nodeGlow)"/>
  <circle cx="720" cy="392" r="35" fill="#1a1740"/>
  <circle cx="720" cy="392" r="27" fill="url(#nodeFill)"/>
  <!-- Calendar body -->
  <rect x="707" y="380" width="26" height="24" rx="3" fill="none" stroke="white" stroke-width="2"/>
  <rect x="707" y="380" width="26" height="8"  rx="3" fill="white" opacity="0.25"/>
  <circle cx="714" cy="395" r="2" fill="white"/>
  <circle cx="720" cy="395" r="2" fill="white"/>
  <circle cx="726" cy="395" r="2" fill="white"/>
  <circle cx="714" cy="401" r="2" fill="white"/>
  <circle cx="720" cy="401" r="2" fill="white"/>

  <!-- NODE: Message — bottom-right (720, 632) -->
  <circle cx="720" cy="632" r="50" fill="#6366f1" opacity="0.12" filter="url(#nodeGlow)"/>
  <circle cx="720" cy="632" r="35" fill="#1a1740"/>
  <circle cx="720" cy="632" r="27" fill="url(#nodeFill)"/>
  <!-- Speech bubble -->
  <path d="M 707 624 Q 707 618 712 618 L 730 618 Q 736 618 736 624
           L 736 640 Q 736 646 730 646 L 718 646 L 713 653 L 715 646
           Q 707 646 707 640 Z" fill="white"/>
  <circle cx="716" cy="632" r="2" fill="#4338ca"/>
  <circle cx="722" cy="632" r="2" fill="#4338ca"/>
  <circle cx="728" cy="632" r="2" fill="#4338ca"/>

  <!-- NODE: Weather — bottom (512, 752) -->
  <circle cx="512" cy="752" r="50" fill="#6366f1" opacity="0.12" filter="url(#nodeGlow)"/>
  <circle cx="512" cy="752" r="35" fill="#1a1740"/>
  <circle cx="512" cy="752" r="27" fill="url(#nodeFill)"/>
  <!-- Cloud: overlapping circles -->
  <circle cx="505" cy="748" r="8"  fill="white"/>
  <circle cx="514" cy="743" r="10" fill="white"/>
  <circle cx="522" cy="748" r="7"  fill="white"/>
  <rect   x="497"  y="748"  width="32" height="8" fill="white"/>
  <!-- Rain drops -->
  <circle cx="506" cy="762" r="2" fill="white" opacity="0.75"/>
  <circle cx="513" cy="765" r="2" fill="white" opacity="0.75"/>
  <circle cx="520" cy="762" r="2" fill="white" opacity="0.75"/>

  <!-- NODE: Battery — bottom-left (304, 632) -->
  <circle cx="304" cy="632" r="50" fill="#6366f1" opacity="0.12" filter="url(#nodeGlow)"/>
  <circle cx="304" cy="632" r="35" fill="#1a1740"/>
  <circle cx="304" cy="632" r="27" fill="url(#nodeFill)"/>
  <!-- Battery body -->
  <rect x="291" y="625" width="22" height="14" rx="3" fill="none" stroke="white" stroke-width="2"/>
  <!-- Terminal nub -->
  <rect x="313" y="629" width="4" height="6" rx="1.5" fill="white"/>
  <!-- Charge fill ~65% -->
  <rect x="293" y="627" width="14" height="10" rx="1.5" fill="white"/>

  <!-- NODE: History — top-left (304, 392) -->
  <circle cx="304" cy="392" r="50" fill="#6366f1" opacity="0.12" filter="url(#nodeGlow)"/>
  <circle cx="304" cy="392" r="35" fill="#1a1740"/>
  <circle cx="304" cy="392" r="27" fill="url(#nodeFill)"/>
  <!-- Stacked bars: past conversation thread -->
  <rect x="292" y="383" width="22" height="3" rx="1.5" fill="white"/>
  <rect x="292" y="390" width="16" height="3" rx="1.5" fill="white" opacity="0.72"/>
  <rect x="292" y="397" width="20" height="3" rx="1.5" fill="white" opacity="0.50"/>

  <!-- ======================= CENTER ======================= -->
  <!-- Radial pulse -->
  <circle cx="512" cy="512" r="88" fill="url(#centerPulse)" opacity="0.50"/>
  <!-- Dashed orbit ring -->
  <circle cx="512" cy="512" r="62" fill="none" stroke="#a78bfa"
          stroke-width="1" stroke-opacity="0.25" stroke-dasharray="6 5"/>
  <!-- 4-pointed star: outer r=46, inner r=18 at 45 deg -->
  <!-- Outer: (512,466)(558,512)(512,558)(466,512) -->
  <!-- Inner: (525,499)(525,525)(499,525)(499,499) -->
  <path d="M 512 466 L 525 499 L 558 512 L 525 525
           L 512 558 L 499 525 L 466 512 L 499 499 Z"
        fill="white" opacity="0.35" filter="url(#centerGlow)"/>
  <path d="M 512 466 L 525 499 L 558 512 L 525 525
           L 512 558 L 499 525 L 466 512 L 499 499 Z"
        fill="white"/>
</svg>
