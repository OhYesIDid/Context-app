<?xml version="1.0" encoding="UTF-8"?>
<!-- ProTxt — V2 Arc (reply arrow, very minimal) -->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#13082e"/>
      <stop offset="100%" stop-color="#09090b"/>
    </radialGradient>

    <!-- Arc stroke gradient (violet → electric indigo) -->
    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>

    <filter id="arcGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="dotGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Paint server for stroke gradient (workaround) -->
    <linearGradient id="arcGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="232" fill="url(#bg)"/>

  <!--
    Reply arc:
    A thick C-shape arc (≈ 270°) centered at (512, 512), radius 280.
    Opens toward bottom-right (like ↩ rotated).
    The arc goes from ~45° to ~315° (clockwise), leaving a gap at bottom-right.
    At 45°: x = 512 + 280*cos(45°) = 512+198 = 710, y = 512 + 280*sin(45°) = 512+198 = 710
    At 315°: x = 512 + 280*cos(315°) = 512+198 = 710, y = 512 + 280*sin(315°) = 512-198 = 314

    Arc from (710, 314) going counter-clockwise (large arc) to (710, 710):
    SVG arc: M 710 314 A 280 280 0 1 0 710 710

    Arrowhead at (710, 710) pointing down-right.
  -->

  <!-- Glow layer (duplicate arc, thicker, blurred) -->
  <path d="M 710 314 A 280 280 0 1 0 710 710"
        fill="none"
        stroke="#7c3aed"
        stroke-width="80"
        stroke-linecap="round"
        opacity="0.3"
        filter="url(#arcGlow)"/>

  <!-- Main arc stroke -->
  <path d="M 710 314 A 280 280 0 1 0 710 710"
        fill="none"
        stroke="url(#arcGrad2)"
        stroke-width="72"
        stroke-linecap="round"/>

  <!-- Arrowhead at (710, 710): pointing right-down -->
  <!-- Arrow tip: (766, 766), wings going back-left -->
  <polygon points="710,710 648,742 742,648"
           fill="url(#arcGrad2)"/>

  <!-- Bright dot at arc start (710, 314) — origin point -->
  <circle cx="710" cy="314" r="20" fill="#c4b5fd" filter="url(#dotGlow)"/>
  <circle cx="710" cy="314" r="12" fill="white"/>
</svg>
