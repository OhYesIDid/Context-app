<?xml version="1.0" encoding="UTF-8"?>
<!--
  ConTxt — Concept D: "Constellation"
  Three nodes (context sources) connected by gradient lines, converging
  on a bright central point (the AI reply). Abstract, techy, unique.
  Research basis: AI app icon trend (network/constellation motifs),
  minimal but meaningful, scales well, no text needed.
-->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#130828"/>
      <stop offset="100%" stop-color="#09090b"/>
    </radialGradient>

    <!-- Connection line gradient (node → center) -->
    <linearGradient id="line1" x1="214" y1="298" x2="512" y2="512"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#6366f1" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="line2" x1="810" y1="298" x2="512" y2="512"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#6366f1" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="line3" x1="512" y1="780" x2="512" y2="512"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#6366f1" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.9"/>
    </linearGradient>

    <!-- Ambient field -->
    <filter id="ambGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="50"/>
    </filter>

    <!-- Node glow -->
    <filter id="nodeGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Central spark glow -->
    <filter id="centerGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="22" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Line glow -->
    <filter id="lineGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="232" fill="url(#bg)"/>

  <!-- Ambient central glow -->
  <circle cx="512" cy="512" r="220" fill="#6d28d9" opacity="0.14"
          filter="url(#ambGlow)"/>

  <!--
    Three outer nodes (context sources):
    Top-left:    (214, 298) — location / maps
    Top-right:   (810, 298) — calendar / time
    Bottom:      (512, 780) — conversation / message
    Center:      (512, 512) — the AI reply spark
  -->

  <!-- Connection lines (drawn before nodes) -->
  <line x1="214" y1="298" x2="512" y2="512"
        stroke="url(#line1)" stroke-width="3.5" stroke-linecap="round"
        filter="url(#lineGlow)"/>
  <line x1="810" y1="298" x2="512" y2="512"
        stroke="url(#line2)" stroke-width="3.5" stroke-linecap="round"
        filter="url(#lineGlow)"/>
  <line x1="512" y1="780" x2="512" y2="512"
        stroke="url(#line3)" stroke-width="3.5" stroke-linecap="round"
        filter="url(#lineGlow)"/>

  <!-- Outer node: top-left (location) -->
  <circle cx="214" cy="298" r="44" fill="#4338ca" opacity="0.3"
          filter="url(#nodeGlow)"/>
  <circle cx="214" cy="298" r="32" fill="#1e1b4b"/>
  <circle cx="214" cy="298" r="22" fill="#6366f1"/>
  <!-- Location pin dot inside -->
  <circle cx="214" cy="294" r="7" fill="white" opacity="0.9"/>
  <circle cx="214" cy="308" r="4" fill="white" opacity="0.5"/>

  <!-- Outer node: top-right (calendar) -->
  <circle cx="810" cy="298" r="44" fill="#4338ca" opacity="0.3"
          filter="url(#nodeGlow)"/>
  <circle cx="810" cy="298" r="32" fill="#1e1b4b"/>
  <circle cx="810" cy="298" r="22" fill="#6366f1"/>
  <!-- Calendar grid dots inside -->
  <circle cx="804" cy="293" r="4" fill="white" opacity="0.9"/>
  <circle cx="816" cy="293" r="4" fill="white" opacity="0.9"/>
  <circle cx="804" cy="305" r="4" fill="white" opacity="0.6"/>
  <circle cx="816" cy="305" r="4" fill="white" opacity="0.6"/>

  <!-- Outer node: bottom (message) -->
  <circle cx="512" cy="780" r="44" fill="#4338ca" opacity="0.3"
          filter="url(#nodeGlow)"/>
  <circle cx="512" cy="780" r="32" fill="#1e1b4b"/>
  <circle cx="512" cy="780" r="22" fill="#6366f1"/>
  <!-- Speech bubble dot inside -->
  <circle cx="506" cy="777" r="4" fill="white" opacity="0.9"/>
  <circle cx="518" cy="777" r="4" fill="white" opacity="0.9"/>
  <circle cx="512" cy="787" r="4" fill="white" opacity="0.6"/>

  <!--
    Central spark: the AI reply output
    4-pointed star, outer r=72, inner r=28
    Outer: top(512,440) right(584,512) bottom(512,584) left(440,512)
    Inner (45°, r=28→offset=20): (532,492)(532,532)(492,532)(492,492)
  -->
  <!-- Outer glow -->
  <path d="M 512 440 L 532 492 L 584 512
           L 532 532 L 512 584
           L 492 532 L 440 512
           L 492 492 Z"
        fill="#a78bfa" opacity="0.35" filter="url(#centerGlow)"/>
  <!-- Main star -->
  <path d="M 512 440 L 532 492 L 584 512
           L 532 532 L 512 584
           L 492 532 L 440 512
           L 492 492 Z"
        fill="white"/>
</svg>
