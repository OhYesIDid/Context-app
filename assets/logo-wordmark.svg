<?xml version="1.0" encoding="UTF-8"?>
<!-- ProTxt Wordmark — horizontal lockup -->
<svg width="600" height="120" viewBox="0 0 600 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Mini icon (speech bubble) -->
  <rect x="0" y="8" width="86" height="64" rx="16" fill="url(#iconGrad)"/>
  <path d="M 66 72 L 84 92 L 56 72 Z" fill="#6366f1"/>
  <!-- Sparkle inside mini icon -->
  <path d="M 43 24 L 48 36 L 60 40 L 48 44 L 43 56 L 38 44 L 26 40 L 38 36 Z"
        fill="white"/>

  <!-- "Pro" in light weight -->
  <text x="108"
        y="76"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif"
        font-size="68"
        font-weight="300"
        fill="#f4f4f5"
        letter-spacing="-1">Pro</text>

  <!-- "txt" in bold -->
  <text x="264"
        y="76"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif"
        font-size="68"
        font-weight="700"
        fill="#818cf8"
        letter-spacing="-1">txt</text>
</svg>
