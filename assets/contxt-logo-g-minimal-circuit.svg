<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!--
    Perfect left-right symmetry around x=512.
    Vertical centre of whole composition = y=512.
      top circles  cy=170,  bottom circles cy=854  →  (170+854)/2 = 512 ✓
    All six connectors share the same shape:
      straight segment → Q-bezier corner (43 px radius) → horizontal to circle
    Top two go UP then turn; bottom two go DOWN then turn.  Colours unchanged.
  -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1c1848"/>
      <stop offset="100%" stop-color="#0e0c22"/>
    </radialGradient>
    <clipPath id="iconClip">
      <rect width="1024" height="1024" rx="232"/>
    </clipPath>
  </defs>

  <rect width="1024" height="1024" rx="232" fill="url(#bg)"/>

  <g clip-path="url(#iconClip)">

    <!-- TOP-LEFT amber: up → left → up → right → up → left → top edge -->
    <path d="M 432 314 L 432 240 L 300 240 L 300 150 L 410 150 L 410 60 L 340 60 L 340 0"
          fill="none" stroke="#f59e0b" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- TOP-RIGHT sky-blue: up → right → up → left → top edge -->
    <path d="M 592 314 L 592 210 L 700 210 L 700 110 L 620 110 L 620 0"
          fill="none" stroke="#38bdf8" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- LEFT lavender: left → up → left → down → left edge -->
    <path d="M 218 512 L 120 512 L 120 390 L 40 390 L 40 560 L 0 560"
          fill="none" stroke="#c4b5fd" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- RIGHT emerald: right → up → right → down → right edge -->
    <path d="M 806 512 L 900 512 L 900 390 L 980 390 L 980 640 L 1024 640"
          fill="none" stroke="#34d399" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- BOTTOM-LEFT pink: down → left → down → right → bottom edge -->
    <path d="M 432 710 L 432 810 L 290 810 L 290 930 L 400 930 L 400 1024"
          fill="none" stroke="#f472b6" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- BOTTOM-RIGHT violet: down → right → down → left → bottom edge -->
    <path d="M 592 710 L 592 820 L 730 820 L 730 920 L 630 920 L 630 1024"
          fill="none" stroke="#a78bfa" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Speech bubble: white stroke, tail at bottom-right corner -->
    <path d="M 218 430 Q 218 314 334 314 L 690 314 Q 806 314 806 430
             L 806 594 Q 806 710 690 710 L 748 792 L 638 710
             L 334 710 Q 218 710 218 594 Z"
          fill="none" stroke="white" stroke-width="40" stroke-linejoin="round"/>

    <!-- Typing indicator: three dots centred in bubble body -->
    <circle cx="452" cy="512" r="22" fill="white"/>
    <circle cx="512" cy="512" r="22" fill="white"/>
    <circle cx="572" cy="512" r="22" fill="white"/>


  </g>
</svg>
