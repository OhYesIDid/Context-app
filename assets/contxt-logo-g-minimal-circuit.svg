<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!--
    Fully symmetric around x=512.
    Vertical centre of whole composition = y=512.
    Bubble body: x 218–806 (±294),  y 278–674 (height 396)
    Tail: centred at x=512, tip y=754
    Top circles cy=206,  bottom circles cy=818  →  (206+818)/2 = 512 ✓
  -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1c1848"/>
      <stop offset="100%" stop-color="#0e0c22"/>
    </radialGradient>
    <clipPath id="iconClip">
      <rect width="1024" height="1024" rx="232"/>
    </clipPath>
  </defs>

  <rect width="1024" height="1024" rx="232" fill="url(#bg)"/>

  <g clip-path="url(#iconClip)">

    <!-- TOP-LEFT amber  x=370, arcs up-left to circle at cx=130 -->
    <path d="M 370 278 Q 370 206 160 206"
          fill="none" stroke="#f59e0b" stroke-width="20" stroke-linecap="round"/>

    <!-- TOP-RIGHT sky-blue  mirror: x=654, arcs up-right to circle at cx=894 -->
    <path d="M 654 278 Q 654 206 864 206"
          fill="none" stroke="#38bdf8" stroke-width="20" stroke-linecap="round"/>

    <!-- LEFT lavender  exits x=218, y=476 (bubble vertical centre) -->
    <path d="M 218 476 L 78 476"
          fill="none" stroke="#c4b5fd" stroke-width="20" stroke-linecap="round"/>

    <!-- RIGHT lavender  mirror -->
    <path d="M 806 476 L 946 476"
          fill="none" stroke="#c4b5fd" stroke-width="20" stroke-linecap="round"/>

    <!-- BOTTOM-LEFT amber  x=360, curves down-left to circle at cx=108 -->
    <path d="M 360 674 L 360 775 Q 360 818 317 818 L 138 818"
          fill="none" stroke="#f59e0b" stroke-width="20" stroke-linecap="round"/>

    <!-- BOTTOM-RIGHT amber  mirror: x=664, curves down-right to circle at cx=916 -->
    <path d="M 664 674 L 664 775 Q 664 818 707 818 L 886 818"
          fill="none" stroke="#f59e0b" stroke-width="20" stroke-linecap="round"/>

    <!-- Speech bubble: white stroke, centred tail, fully symmetric -->
    <path d="M 218 394 Q 218 278 334 278 L 690 278 Q 806 278 806 394
             L 806 558 Q 806 674 690 674 L 538 674 L 512 754 L 486 674
             L 334 674 Q 218 674 218 558 Z"
          fill="none" stroke="white" stroke-width="20" stroke-linejoin="round"/>

    <!-- Endpoint circles, all r=30 solid fill -->
    <circle cx="130" cy="206" r="30" fill="#f59e0b"/>   <!-- top-left  512-130=382 -->
    <circle cx="894" cy="206" r="30" fill="#38bdf8"/>   <!-- top-right 894-512=382 ✓ -->
    <circle cx="48"  cy="476" r="30" fill="#c4b5fd"/>   <!-- left      512-48=464  -->
    <circle cx="976" cy="476" r="30" fill="#c4b5fd"/>   <!-- right     976-512=464 ✓ -->
    <circle cx="108" cy="818" r="30" fill="#f59e0b"/>   <!-- bot-left  512-108=404 -->
    <circle cx="916" cy="818" r="30" fill="#f59e0b"/>   <!-- bot-right 916-512=404 ✓ -->

  </g>
</svg>
