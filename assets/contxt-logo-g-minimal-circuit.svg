<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!--
    Perfect left-right symmetry around x=512.
    Vertical centre of whole composition = y=512.
      top circles  cy=170,  bottom circles cy=854  →  (170+854)/2 = 512 ✓
    All six connectors share the same shape:
      straight segment → Q-bezier corner (43 px radius) → horizontal to circle
    Top two go UP then turn; bottom two go DOWN then turn.  Colours unchanged.
  -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1c1848"/>
      <stop offset="100%" stop-color="#0e0c22"/>
    </radialGradient>
    <clipPath id="iconClip">
      <rect width="1024" height="1024" rx="232"/>
    </clipPath>
  </defs>

  <rect width="1024" height="1024" rx="232" fill="url(#bg)"/>

  <g clip-path="url(#iconClip)">

    <!-- TOP-LEFT amber: up 101 px → curve left → horizontal to circle -->
    <path d="M 432 314 L 432 213 Q 432 170 389 170 L 160 170"
          fill="none" stroke="#f59e0b" stroke-width="20" stroke-linecap="round"/>

    <!-- TOP-RIGHT sky-blue: mirror of top-left -->
    <path d="M 592 314 L 592 213 Q 592 170 635 170 L 864 170"
          fill="none" stroke="#38bdf8" stroke-width="20" stroke-linecap="round"/>

    <!-- LEFT lavender: straight horizontal (bubble vertical centre y=512) -->
    <path d="M 218 512 L 78 512"
          fill="none" stroke="#c4b5fd" stroke-width="20" stroke-linecap="round"/>

    <!-- RIGHT lavender: mirror -->
    <path d="M 806 512 L 946 512"
          fill="none" stroke="#c4b5fd" stroke-width="20" stroke-linecap="round"/>

    <!-- BOTTOM-LEFT amber: down 101 px → curve left → horizontal to circle -->
    <path d="M 432 710 L 432 811 Q 432 854 389 854 L 138 854"
          fill="none" stroke="#f59e0b" stroke-width="20" stroke-linecap="round"/>

    <!-- BOTTOM-RIGHT amber: exits at x=592, clears tail base at x=638 -->
    <path d="M 592 710 L 592 811 Q 592 854 635 854 L 886 854"
          fill="none" stroke="#f59e0b" stroke-width="20" stroke-linecap="round"/>

    <!-- Speech bubble: white stroke, tail at bottom-right corner -->
    <path d="M 218 430 Q 218 314 334 314 L 690 314 Q 806 314 806 430
             L 806 594 Q 806 710 690 710 L 748 792 L 638 710
             L 334 710 Q 218 710 218 594 Z"
          fill="none" stroke="white" stroke-width="40" stroke-linejoin="round"/>

    <!-- Typing indicator: three dots centred in bubble body -->
    <circle cx="452" cy="512" r="22" fill="white"/>
    <circle cx="512" cy="512" r="22" fill="white"/>
    <circle cx="572" cy="512" r="22" fill="white"/>

    <!-- Endpoint circles, all r=30 solid fill -->
    <circle cx="130" cy="170" r="30" fill="#f59e0b"/>   <!-- top-left  512−130=382 -->
    <circle cx="894" cy="170" r="30" fill="#38bdf8"/>   <!-- top-right 894−512=382 ✓ -->
    <circle cx="48"  cy="512" r="30" fill="#c4b5fd"/>   <!-- left      512−48=464  -->
    <circle cx="976" cy="512" r="30" fill="#c4b5fd"/>   <!-- right     976−512=464 ✓ -->
    <circle cx="108" cy="854" r="30" fill="#f59e0b"/>   <!-- bot-left  512−108=404 -->
    <circle cx="916" cy="854" r="30" fill="#f59e0b"/>   <!-- bot-right  916−512=404 ✓ -->

  </g>
</svg>
