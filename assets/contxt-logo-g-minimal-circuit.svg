<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#1c1848"/>
      <stop offset="100%" stop-color="#0e0c22"/>
    </radialGradient>

    <clipPath id="iconClip">
      <rect width="1024" height="1024" rx="232"/>
    </clipPath>
  </defs>

  <rect width="1024" height="1024" rx="232" fill="url(#bg)"/>

  <g clip-path="url(#iconClip)">

    <!-- TOP-LEFT: amber — smooth arc up-left -->
    <path d="M 368 228 Q 368 158 188 158"
          fill="none" stroke="#f59e0b" stroke-width="20" stroke-linecap="round"/>

    <!-- TOP-RIGHT: sky-blue — smooth arc up-right -->
    <path d="M 660 228 Q 660 158 836 158"
          fill="none" stroke="#38bdf8" stroke-width="20" stroke-linecap="round"/>

    <!-- LEFT: lavender — straight horizontal -->
    <path d="M 218 450 L 58 450"
          fill="none" stroke="#c4b5fd" stroke-width="20" stroke-linecap="round"/>

    <!-- RIGHT: lavender — straight horizontal -->
    <path d="M 806 450 L 966 450"
          fill="none" stroke="#c4b5fd" stroke-width="20" stroke-linecap="round"/>

    <!-- BOTTOM-LEFT: amber — down then smooth curve left -->
    <path d="M 308 652 L 308 752 Q 308 796 264 796 L 130 796"
          fill="none" stroke="#f59e0b" stroke-width="20" stroke-linecap="round"/>

    <!-- BOTTOM-RIGHT: amber — down then smooth curve right -->
    <path d="M 682 652 L 682 752 Q 682 796 726 796 L 878 796"
          fill="none" stroke="#f59e0b" stroke-width="20" stroke-linecap="round"/>

    <!-- Speech bubble: white stroke, tail left of centre -->
    <path d="M 218 342 Q 218 228 332 228 L 692 228 Q 806 228 806 342
             L 806 538 Q 806 652 692 652 L 450 652 L 415 730 L 392 652
             L 332 652 Q 218 652 218 538 Z"
          fill="none" stroke="white" stroke-width="20" stroke-linejoin="round"/>

    <!-- Solid filled endpoint circles -->
    <circle cx="164" cy="158" r="30" fill="#f59e0b"/>
    <circle cx="860" cy="158" r="30" fill="#38bdf8"/>
    <circle cx="34"  cy="450" r="30" fill="#c4b5fd"/>
    <circle cx="990" cy="450" r="30" fill="#c4b5fd"/>
    <circle cx="106" cy="796" r="30" fill="#f59e0b"/>
    <circle cx="902" cy="796" r="30" fill="#f59e0b"/>

  </g>
</svg>
