<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#12102a"/>
      <stop offset="100%" stop-color="#0c0a1e"/>
    </linearGradient>

    <clipPath id="iconClip">
      <rect width="1024" height="1024" rx="232"/>
    </clipPath>

    <!-- Bubble gradient: amber at tail → pink → violet → sky-blue at top -->
    <linearGradient id="bubbleGrad" x1="512" y1="672" x2="512" y2="325"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#f59e0b"/>
      <stop offset="28%"  stop-color="#f472b6"/>
      <stop offset="60%"  stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" rx="232" fill="url(#bg)"/>

  <g clip-path="url(#iconClip)">

    <!-- Traces drawn first so bubble stroke cleanly covers their origin -->

    <!-- TOP-LEFT: amber — exits bubble top, smooth curve left to circle -->
    <path d="M 398 325 Q 398 258 230 258"
          fill="none" stroke="#f59e0b" stroke-width="13" stroke-linecap="round"/>

    <!-- TOP-RIGHT: sky-blue — exits bubble top, smooth curve right to circle -->
    <path d="M 636 325 Q 636 258 796 258"
          fill="none" stroke="#38bdf8" stroke-width="13" stroke-linecap="round"/>

    <!-- LEFT: lavender — exits left side, straight -->
    <path d="M 288 462 L 135 462"
          fill="none" stroke="#c4b5fd" stroke-width="13" stroke-linecap="round"/>

    <!-- RIGHT: lavender — exits right side, straight -->
    <path d="M 736 462 L 889 462"
          fill="none" stroke="#c4b5fd" stroke-width="13" stroke-linecap="round"/>

    <!-- BOTTOM-LEFT: amber — exits bottom, right-angle bend left to circle -->
    <path d="M 366 612 L 366 714 L 237 714"
          fill="none" stroke="#f59e0b" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- BOTTOM-RIGHT: amber — exits bottom, right-angle bend right to circle -->
    <path d="M 658 612 L 658 714 L 787 714"
          fill="none" stroke="#f59e0b" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Speech bubble: stroke-only, gradient, tail left of centre -->
    <path d="M 288 412 Q 288 325 373 325 L 651 325 Q 736 325 736 412
             L 736 525 Q 736 612 651 612 L 456 612 L 424 672 L 406 612
             L 373 612 Q 288 612 288 525 Z"
          fill="none" stroke="url(#bubbleGrad)" stroke-width="14" stroke-linejoin="round"/>

    <!-- Open ring endpoints -->
    <circle cx="208"  cy="258" r="22" fill="none" stroke="#f59e0b" stroke-width="13"/>
    <circle cx="818"  cy="258" r="22" fill="none" stroke="#38bdf8" stroke-width="13"/>
    <circle cx="113"  cy="462" r="22" fill="none" stroke="#c4b5fd" stroke-width="13"/>
    <circle cx="911"  cy="462" r="22" fill="none" stroke="#c4b5fd" stroke-width="13"/>
    <circle cx="215"  cy="714" r="22" fill="none" stroke="#f59e0b" stroke-width="13"/>
    <circle cx="809"  cy="714" r="22" fill="none" stroke="#f59e0b" stroke-width="13"/>

  </g>
</svg>
