<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#1c1848"/>
      <stop offset="100%" stop-color="#0e0c22"/>
    </radialGradient>

    <clipPath id="iconClip">
      <rect width="1024" height="1024" rx="232"/>
    </clipPath>

    <!-- Gradient: amber at tail → violet → hot-pink at top -->
    <linearGradient id="bubbleGrad" x1="512" y1="682" x2="512" y2="305"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#f59e0b"/>
      <stop offset="38%"  stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" rx="232" fill="url(#bg)"/>

  <g clip-path="url(#iconClip)">

    <!-- TOP-LEFT: amber — smooth arc up-left -->
    <path d="M 396 305 Q 396 242 224 242"
          fill="none" stroke="#f59e0b" stroke-width="20" stroke-linecap="round"/>

    <!-- TOP-RIGHT: sky-blue — smooth arc up-right -->
    <path d="M 640 305 Q 640 242 802 242"
          fill="none" stroke="#38bdf8" stroke-width="20" stroke-linecap="round"/>

    <!-- LEFT: lavender — straight horizontal -->
    <path d="M 278 462 L 122 462"
          fill="none" stroke="#c4b5fd" stroke-width="20" stroke-linecap="round"/>

    <!-- RIGHT: lavender — straight horizontal -->
    <path d="M 746 462 L 902 462"
          fill="none" stroke="#c4b5fd" stroke-width="20" stroke-linecap="round"/>

    <!-- BOTTOM-LEFT: amber — down then bend left -->
    <path d="M 356 620 L 356 722 L 222 722"
          fill="none" stroke="#f59e0b" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- BOTTOM-RIGHT: amber — down then bend right -->
    <path d="M 660 620 L 660 722 L 800 722"
          fill="none" stroke="#f59e0b" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Speech bubble: stroke-only gradient, tail left of centre -->
    <path d="M 278 408 Q 278 305 372 305 L 652 305 Q 746 305 746 408
             L 746 527 Q 746 620 652 620 L 458 620 L 424 682 L 404 620
             L 372 620 Q 278 620 278 527 Z"
          fill="none" stroke="url(#bubbleGrad)" stroke-width="20" stroke-linejoin="round"/>

    <!-- Solid filled endpoint circles -->
    <circle cx="200" cy="242" r="30" fill="#f59e0b"/>
    <circle cx="824" cy="242" r="30" fill="#38bdf8"/>
    <circle cx="98"  cy="462" r="30" fill="#c4b5fd"/>
    <circle cx="926" cy="462" r="30" fill="#c4b5fd"/>
    <circle cx="198" cy="722" r="30" fill="#f59e0b"/>
    <circle cx="822" cy="722" r="30" fill="#f59e0b"/>

  </g>
</svg>
