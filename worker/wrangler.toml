name = "contextreply-suggest"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# Set the Claude API key as a secret (never commit the real value):
#   wrangler secret put CLAUDE_API_KEY
# Then add it to your EAS / .env as:
#   EXPO_PUBLIC_WORKER_URL=https://contextreply-suggest.<your-subdomain>.workers.dev

# KV namespace for per-IP rate limiting (10 req/min).
# Create with: wrangler kv namespace create "RATE_LIMIT"
# Then replace the id below with the one printed by that command.
# Preview namespace for local dev: wrangler kv namespace create "RATE_LIMIT" --preview
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_KV_PREVIEW_NAMESPACE_ID"
